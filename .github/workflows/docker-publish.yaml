name: Publish base docker images

on:
  # Push to main branch publishes the image to the registry
  push:
    branches: [ 'main' ]
  # PRs targeting main build both arches to validate them but do NOT push
  # (see `push:` on the build step) — a safe pre-merge check for arm64.
  pull_request:
    branches: [ 'main' ]
  # Manual run from any branch: Actions tab → this workflow → Run workflow.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Build for x86_64 hosts/robot and arm64 (Apple-silicon) dev machines.
  PLATFORMS: linux/amd64,linux/arm64
  # Docker Build Cloud builder — gives native amd64 AND arm64 builders, so the
  # arm64 image is built natively (no slow QEMU). Reuses the existing endpoint;
  # change to a dedicated "<org>/<builder>" if you create one for this repo.
  BUILD_CLOUD_ENDPOINT: deepanaleggedrobotics/rss26

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    # `GITHUB_TOKEN` permissions for the job
    permissions:
      contents: read
      packages: write
      attestations: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      # Log in to Docker Hub — required to access the Docker Build Cloud builder
      # (separate from the GHCR login below, which is only for pushing the image).
      - name: Log in to Docker Hub (Build Cloud)
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      # Set up Buildx backed by Docker Build Cloud (native multi-arch builders).
      # NOTE: needs setup-buildx-action >= v3.4 for the `cloud` driver — the old
      # v3.0.0 pin fails with `failed to find driver "cloud"`. Track latest v3.
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx with Docker Build Cloud
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: ${{ env.BUILD_CLOUD_ENDPOINT }}

      # GHCR requires lowercase repository names; github.repository preserves case.
      - name: Lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      # Login is required for both pushing images and pulling cache from the
      # private registry. On PRs from forks GITHUB_TOKEN lacks write scope, so
      # we skip the push but still log in to allow registry cache reads.
      - name: Log in to registry ${{ env.REGISTRY }}
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── a2_base stage (builds first — builder is an internal dependency) ────────
      # Installs all apt packages (ROS, perception, dev tools) and the Python
      # venv on top of the upstream ROS image. Building this stage also builds
      # the builder stage internally (COPY --from=builder), so builder layers are
      # fully cached in GHA after this step at no extra disk cost.

      - name: Extract Docker metadata (a2_base)
        id: meta-a2-base
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/a2_base

      - name: Build and push a2_base stage (multi-arch)
        id: push-a2-base
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./environment/Dockerfile.base
          target: a2_base
          platforms: ${{ env.PLATFORMS }}
          # On PRs build into the Build Cloud cache only — a multi-node cloud
          # builder can't "cloud pull" a multi-arch result back to the runner,
          # so `push: false` (which loads locally) fails. On push/dispatch,
          # export to the registry (pushes the multi-arch manifest to GHCR).
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
          tags: ${{ steps.meta-a2-base.outputs.tags }}
          labels: ${{ steps.meta-a2-base.outputs.labels }}
          # Multi-arch manifest is cleaner without the extra provenance entry.
          provenance: false

      # TODO: Attestation feature not available to private repositories.
      # Consider doing this once repo is public.
      #
      # - name: Generate artifact attestation
      #   uses: actions/attest-build-provenance@v3
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
      #     subject-digest: ${{ steps.push-a2-base.outputs.digest }}
      #     push-to-registry: true
